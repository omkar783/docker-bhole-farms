# ============================================
# Nginx — Bhole Farms (HTTP → HTTPS redirect)
# ============================================

# Include hardening (rate limits, buffers, timeouts, SSL, headers)
include /etc/nginx/hardening.conf;

# ============================================
# HTTP → HTTPS redirect
# ============================================
server {
    listen 80 default_server;
    listen [::]:80 default_server;
    server_name bholefarms.com www.bholefarms.com;

    # Let's Encrypt challenge — served without redirect
    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    # Redirect everything else to HTTPS
    location / {
        return 301 https://$host$request_uri;
    }
}

# ============================================
# HTTPS — main site
# ============================================
server {
    listen 443 ssl default_server;
    listen [::]:443 ssl default_server;
    http2 on;
    server_name bholefarms.com www.bholefarms.com;

    # SSL certs (mounted by certbot)
    ssl_certificate /etc/letsencrypt/live/bholefarms.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/bholefarms.com/privkey.pem;

    # Root for cert challenge fallback
    root /var/www/certbot;

    # ==========================================
    # Proxy to Next.js app
    # ==========================================
    location / {
        proxy_pass http://web:3000;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_cache_bypass $http_upgrade;

        # Disable buffering for streaming responses
        proxy_buffering off;

        # Timeouts
        proxy_connect_timeout 60s;
        proxy_send_timeout 60s;
        proxy_read_timeout 60s;
    }

    # ==========================================
    # Static assets — serve directly (cached)
    # ==========================================
    location /_next/static/ {
        proxy_pass http://web:3000;
        expires 365d;
        add_header Cache-Control "public, immutable";
        access_log off;
    }

    location /static/ {
        proxy_pass http://web:3000;
        expires 30d;
        add_header Cache-Control "public";
    }

    # ==========================================
    # Uploads — served with content-type
    # ==========================================
    location /uploads/ {
        proxy_pass http://web:3000;
        expires 7d;
        add_header Cache-Control "public";
    }

    # ==========================================
    # Admin — rate limited
    # ==========================================
    location /admin {
        limit_req zone=admin burst=5 nodelay;
        proxy_pass http://web:3000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # ==========================================
    # API — rate limited
    # ==========================================
    location /api/ {
        limit_req zone=api burst=10 nodelay;
        proxy_pass http://web:3000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # ==========================================
    # Auth endpoints — strict rate limit
    # ==========================================
    location /api/auth/ {
        limit_req zone=login burst=3 nodelay;
        proxy_pass http://web:3000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # ==========================================
    # Access Control — block sensitive paths
    # ==========================================

    # Deny hidden files (starting with .)
    location ~ /\. {
        deny all;
        access_log off;
        log_not_found off;
        return 404;
    }

    # Deny sensitive project files
    location ~* (\.git|\.env|\.sql|\.yml|package-lock\.json|composer\.lock) {
        deny all;
        access_log off;
        log_not_found off;
        return 404;
    }

    # Deny backup/config files
    location ~* (backup|config|\.bak|\.swp|\.old|\.orig) {
        deny all;
        access_log off;
        return 404;
    }

    # Deny /node_modules if exposed
    location /node_modules {
        deny all;
        access_log off;
        return 404;
    }

    # ==========================================
    # Request Method Restriction
    # ==========================================
    if ($request_method !~ ^(GET|HEAD|POST|PUT|DELETE|PATCH|OPTIONS)$) {
        return 405;
    }

    # ==========================================
    # Access logs (structured, buffered)
    # ==========================================
    access_log /var/log/nginx/access.log security buffer=32k flush=5s;
    error_log /var/log/nginx/error.log warn;
}
