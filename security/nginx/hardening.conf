# ============================================
# Nginx Security Hardening Configuration
# Apply: include /etc/nginx/hardening.conf;
# ============================================

# Hide Nginx version from attackers
server_tokens off;

# ============================================
# Rate Limiting Zones
# ============================================

# General rate limit — 10 req/s per IP
limit_req_zone $binary_remote_addr zone=general:10m rate=10r/s;

# API rate limit — 30 req/s per IP
limit_req_zone $binary_remote_addr zone=api:10m rate=30r/s;

# Login rate limit — 5 req/min per IP (strict)
limit_req_zone $binary_remote_addr zone=login:10m rate=5r/m;

# Admin rate limit — 20 req/min per IP
limit_req_zone $binary_remote_addr zone=admin:10m rate=20r/m;

# ============================================
# Buffer Size Limits (prevent buffer overflow attacks)
# ============================================

# Maximum size of the client request body
client_body_buffer_size 128k;

# Maximum size of the client request header
client_header_buffer_size 1k;

# Maximum number and size of large client headers
large_client_header_buffers 4 8k;

# Maximum body size (adjust based on your upload needs)
client_max_body_size 20m;

# ============================================
# Timeout Settings (prevent slow-loris attacks)
# ============================================

# Wait for the client body after sending request header
client_body_timeout 12s;

# Wait for the client header after receiving first byte
client_header_timeout 12s;

# Keepalive connection timeout
keepalive_timeout 15s;

# Send timeout — wait for client acknowledgement
send_timeout 10s;

# ============================================
# SSL/TLS Configuration (TLS 1.2 & 1.3 only)
# ============================================

# Protocols — disable old, insecure versions
ssl_protocols TLSv1.2 TLSv1.3;

# Strong ciphers only (no weak, no export, no null, no MD5)
ssl_ciphers ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384:ECDHE-ECDSA-CHACHA20-POLY1305:ECDHE-RSA-CHACHA20-POLY1305:DHE-RSA-AES128-GCM-SHA256:DHE-RSA-AES256-GCM-SHA384;

# Prefer server ciphers over client
ssl_prefer_server_ciphers on;

# Enable DH params (generate with: openssl dhparam -out /etc/ssl/dhparam.pem 4096)
ssl_dhparam /etc/ssl/dhparam.pem;

# Session cache
ssl_session_cache shared:SSL:10m;
ssl_session_timeout 10m;

# Session tickets
ssl_session_tickets off;

# OCSP Stapling
ssl_stapling on;
ssl_stapling_verify on;
resolver 1.1.1.1 8.8.8.8 valid=300s;
resolver_timeout 5s;

# HSTS — tell browsers to always use HTTPS (preload-ready)
add_header Strict-Transport-Security "max-age=63072000; includeSubDomains; preload" always;

# ============================================
# Security Headers
# ============================================

# Prevent MIME-type sniffing
add_header X-Content-Type-Options "nosniff" always;

# Prevent clickjacking
add_header X-Frame-Options "DENY" always;

# Enable XSS filter in browsers (deprecated but still useful)
add_header X-XSS-Protection "1; mode=block" always;

# Control referrer information
add_header Referrer-Policy "strict-origin-when-cross-origin" always;

# Restrict feature APIs
add_header Permissions-Policy "camera=(), microphone=(), geolocation=()" always;

# Content Security Policy (customize for your app)
add_header Content-Security-Policy "
    default-src 'self';
    script-src 'self' 'unsafe-inline' 'unsafe-eval';
    style-src 'self' 'unsafe-inline';
    img-src 'self' data: https: blob:;
    font-src 'self';
    connect-src 'self';
    frame-src 'self' https://www.google.com;
    worker-src blob:;
    base-uri 'self';
    form-action 'self';
" always;

# ============================================
# Access Control
# ============================================

# Deny access to hidden files (starting with .)
location ~ /\. {
    deny all;
    access_log off;
    log_not_found off;
    return 404;
}

# Deny access to sensitive files
location ~* (\.git|\.env|\.sql|\.yml|package-lock\.json|composer\.lock) {
    deny all;
    access_log off;
    log_not_found off;
    return 404;
}

# Deny access to backup and config files
location ~* (backup|config|\.bak|\.swp|\.old|\.orig) {
    deny all;
    access_log off;
    return 404;
}

# Deny access to /node_modules if exposed
location /node_modules {
    deny all;
    access_log off;
    return 404;
}

# Deny access to /.next server-side files
location ~* /_next/static/(?!.*\.(js|css|png|jpg|jpeg|gif|ico|svg|webp|woff2?|ttf|eot)) {
    deny all;
    return 404;
}

# ============================================
# Request Method Restriction
# ============================================

# Allow only safe methods (block TRACE, TRACK, CONNECT)
if ($request_method !~ ^(GET|HEAD|POST|PUT|DELETE|PATCH|OPTIONS)$) {
    return 405;
}

# ============================================
# Logging
# ============================================

# Custom log format with response time
log_format security '$remote_addr - $remote_user [$time_local] '
    '"$request" $status $body_bytes_sent '
    '"$http_referer" "$http_user_agent" '
    '$request_time $upstream_response_time '
    '$ssl_protocol/$ssl_cipher';

# Access log
access_log /var/log/nginx/access.log security buffer=32k flush=5s;

# ============================================
# GEO Block (optional — restrict admin access)
# ============================================

# Example: Allow admin access only from specific countries
# geo $admin_access {
#     default 0;
#     IN 1;  # India
#     US 1;  # United States
# }
#
# location /admin {
#     if ($admin_access = 0) {
#         return 403;
#     }
#     # ... proxy pass to app
# }

# ============================================
# Admin Path Protection (additional layer)
# ============================================

location /admin {
    # Rate limit admin access
    limit_req zone=admin burst=5 nodelay;
    
    # Additional access control
    # (proxy_pass to your app)
}

# ============================================
# API Rate Limiting
# ============================================

location /api/ {
    limit_req zone=api burst=10 nodelay;
    # (proxy_pass to your app)
}

location /api/auth/ {
    limit_req zone=login burst=3 nodelay;
    # (proxy_pass to your app)
}
