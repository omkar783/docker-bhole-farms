# ============================================
# Nginx Security Hardening Configuration
# Apply: include /etc/nginx/hardening.conf;
# NOTE: Included at http level. Use nginx.conf for server/location blocks.
# ============================================

# Hide Nginx version from attackers
server_tokens off;

# ============================================
# Rate Limiting Zones
# ============================================

limit_req_zone $binary_remote_addr zone=general:10m rate=10r/s;
limit_req_zone $binary_remote_addr zone=api:10m rate=30r/s;
limit_req_zone $binary_remote_addr zone=login:10m rate=5r/m;
limit_req_zone $binary_remote_addr zone=admin:10m rate=20r/m;

# ============================================
# Buffer Size Limits
# ============================================

client_body_buffer_size 128k;
client_header_buffer_size 1k;
large_client_header_buffers 4 8k;
client_max_body_size 20m;

# ============================================
# Timeout Settings (slow-loris prevention)
# ============================================

client_body_timeout 12s;
client_header_timeout 12s;
send_timeout 10s;

# ============================================
# SSL/TLS
# ============================================

ssl_protocols TLSv1.2 TLSv1.3;
ssl_ciphers ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384:ECDHE-ECDSA-CHACHA20-POLY1305:ECDHE-RSA-CHACHA20-POLY1305:DHE-RSA-AES128-GCM-SHA256:DHE-RSA-AES256-GCM-SHA384;
ssl_prefer_server_ciphers on;
# ssl_dhparam omitted — nginx auto-generates; uncomment and generate with: openssl dhparam -out /etc/ssl/dhparam.pem 4096
ssl_session_cache shared:SSL:10m;
ssl_session_timeout 10m;
ssl_session_tickets off;
ssl_stapling on;
ssl_stapling_verify on;
resolver 1.1.1.1 8.8.8.8 valid=300s;
resolver_timeout 5s;
add_header Strict-Transport-Security "max-age=63072000; includeSubDomains; preload" always;

# ============================================
# Security Headers
# ============================================

add_header X-Content-Type-Options "nosniff" always;
add_header X-Frame-Options "DENY" always;
add_header X-XSS-Protection "1; mode=block" always;
add_header Referrer-Policy "strict-origin-when-cross-origin" always;
add_header Permissions-Policy "camera=(), microphone=(), geolocation=()" always;
add_header Content-Security-Policy "
    default-src 'self';
    script-src 'self' 'unsafe-inline' 'unsafe-eval';
    style-src 'self' 'unsafe-inline';
    img-src 'self' data: https: blob:;
    font-src 'self';
    connect-src 'self';
    frame-src 'self' https://www.google.com;
    worker-src blob:;
    base-uri 'self';
    form-action 'self';
" always;

# ============================================
# Logging
# ============================================

log_format security '$remote_addr - $remote_user [$time_local] '
    '"$request" $status $body_bytes_sent '
    '"$http_referer" "$http_user_agent" '
    '$request_time $upstream_response_time '
    '$ssl_protocol/$ssl_cipher';
