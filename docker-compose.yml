# ============================================
# Bhole Farms — Docker Compose (Development + Production)
# ============================================

x-app-defaults: &app-defaults
  build:
    context: .
    dockerfile: Dockerfile
    args:
      RESEND_API_KEY: ${RESEND_API_KEY}
      ADMIN_EMAIL: ${ADMIN_EMAIL}
      NEXTAUTH_URL: ${NEXTAUTH_URL:-http://localhost:3000}
      AUTH_URL: ${AUTH_URL:-http://localhost:3000}
      NEXT_PUBLIC_SITE_URL: ${NEXT_PUBLIC_SITE_URL:-http://localhost:3000}
  restart: unless-stopped
  environment:
    NODE_ENV: production
    HOSTNAME: "0.0.0.0"
    # DATABASE_URL is resolved here so ${DB_PASSWORD} gets substituted
    # (env_file doesn't resolve variable references in values)
    DATABASE_URL: postgresql://bhole_user:${DB_PASSWORD}@postgres:5432/bhole_prod
  env_file:
    - .env.docker
  depends_on:
    postgres:
      condition: service_healthy
  networks:
    - frontend
    - internal

services:
  # ==========================================
  # PostgreSQL Database
  # ==========================================
  postgres:
    image: postgres:16-alpine
    container_name: bhole-postgres
    restart: unless-stopped
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./prisma:/docker-entrypoint-initdb.d/prisma:ro
    environment:
      POSTGRES_DB: bhole_prod
      POSTGRES_USER: bhole_user
      POSTGRES_PASSWORD: ${DB_PASSWORD:-changeme_in_production}
      POSTGRES_PORT: 5432
    ports:
      - "127.0.0.1:5433:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U bhole_user -d bhole_prod"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    networks:
      - internal
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"

  # ==========================================
  # Next.js Application
  # ==========================================
  web:
    <<: *app-defaults
    container_name: bhole-web
    ports:
      - "127.0.0.1:3000:3000"
    volumes:
      # Upload persistence (temp files stay across restarts)
      - uploads_data:/app/public/uploads
      # For development: hot-reload with local source
      # - ./src:/app/src
      # - ./public:/app/public
    depends_on:
      postgres:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:3000/"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s
    # Security hardening (applied on top of defaults)
    cap_drop:
      - ALL
    cap_add:
      - NET_BIND_SERVICE
    security_opt:
      - no-new-privileges:true

  # ==========================================
  # Nginx — Reverse Proxy with Security Hardening
  # ==========================================
  nginx:
    build:
      context: ./security/nginx
      dockerfile: Dockerfile
    container_name: bhole-nginx
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      # SSL certificates (managed by certbot)
      - certbot_conf:/etc/letsencrypt
      - certbot_www:/var/www/certbot
      # Logs
      - nginx_logs:/var/log/nginx
    depends_on:
      - web
    networks:
      - frontend
    healthcheck:
      test: ["CMD-SHELL", "nc -z localhost 80 || exit 1"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s
    cap_drop:
      - ALL
    cap_add:
      - NET_BIND_SERVICE
      - SETPCAP
      - SETUID
      - SETGID
      - CHOWN
      - DAC_OVERRIDE
      - AUDIT_WRITE
    security_opt:
      - no-new-privileges:true
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"

  # ==========================================
  # Certbot — Let's Encrypt SSL Auto-Renewal
  # ==========================================
  certbot:
    image: certbot/certbot:latest
    container_name: bhole-certbot
    restart: unless-stopped
    volumes:
      - certbot_conf:/etc/letsencrypt
      - certbot_www:/var/www/certbot
    entrypoint: >
      sh -c "while true; do
        certbot renew --quiet --non-interactive;
        sleep 12h;
      done"
    depends_on:
      - nginx
    networks:
      - frontend

  # ==========================================
  # Optional: Redis for caching / sessions
  # ==========================================
  # redis:
  #   image: redis:7-alpine
  #   container_name: bhole-redis
  #   restart: unless-stopped
  #   command: redis-server --appendonly yes --requirepass ${REDIS_PASSWORD}
  #   volumes:
  #     - redis_data:/data
  #   healthcheck:
  #     test: ["CMD", "redis-cli", "ping"]
  #     interval: 10s
  #     timeout: 5s
  #     retries: 3
  #   networks:
  #     - internal

volumes:
  postgres_data:
    driver: local
  uploads_data:
    driver: local
  # redis_data:
  #   driver: local
  nginx_logs:
    driver: local
  certbot_conf:
    driver: local
  certbot_www:
    driver: local

networks:
  frontend:
    driver: bridge
  internal:
    driver: bridge
    internal: true  # Database not exposed to internet
